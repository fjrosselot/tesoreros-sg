<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comité 4°B — Saint George's</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117; --surface:#181c26; --surface2:#1e2335;
  --border:#252d42; --border2:#2e3a55;
  --text:#eef0f5; --muted:#7a85a0; --subtle:#323d57;
  --navy:#2d5be3; --navy-dim:rgba(45,91,227,.15); --navy-light:#5b82f0;
  --yellow:#f5c842; --yellow-dim:rgba(245,200,66,.12);
  --green:#3dd68c; --green-dim:rgba(61,214,140,.1);
  --red:#f16060; --red-dim:rgba(241,96,96,.1);
  --r:12px; --r-lg:16px;
  --sidebar:220px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
button{font-family:'Roboto',sans-serif;cursor:pointer;}
input,select{font-family:'Roboto',sans-serif;}
.hidden{display:none!important;}
@keyframes slideUp{from{transform:translateY(52px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══════════════ LOGIN ══════════════════════════════════════ */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(45,91,227,.18) 0%,var(--bg) 65%);}
.login-card{width:100%;max-width:340px;text-align:center;}
.login-badge{width:72px;height:72px;background:var(--navy-dim);border:1px solid rgba(45,91,227,.3);
  border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  font-size:28px;font-weight:700;color:var(--navy-light);}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:40px;}
#pin-input{width:100%;padding:16px;border-radius:var(--r);border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);font-size:26px;text-align:center;outline:none;
  letter-spacing:12px;margin-bottom:12px;transition:border-color .2s;}
#pin-input.err{border-color:var(--red);}
.pin-err{color:var(--red);font-size:12px;margin-bottom:12px;}
.login-btn{width:100%;padding:15px;border-radius:var(--r);background:var(--navy);color:#fff;
  border:none;font-size:15px;font-weight:600;margin-bottom:20px;}
.login-hint{color:var(--muted);font-size:11px;}

/* ══════════════ MOBILE LAYOUT (< 768px) ══════════════════ */
#app{display:flex;flex-direction:column;min-height:100vh;}

/* Mobile header */
.mob-header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:13px 16px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:10;}
.header-left{display:flex;align-items:center;gap:11px;}
.header-badge{background:var(--navy-dim);border:1px solid rgba(45,91,227,.3);
  border-radius:10px;width:38px;height:38px;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:var(--navy-light);}
.header-title{font-weight:700;font-size:14px;}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.exit-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);
  border-radius:8px;padding:7px 13px;font-size:12px;font-weight:500;}

/* Mobile content */
.mob-content{flex:1;overflow-y:auto;padding:16px 14px 96px;}

/* Mobile tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);display:flex;z-index:10;}
.tab-btn{flex:1;padding:10px 0 8px;background:transparent;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
  border-top:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--navy-light);border-top-color:var(--navy);}
.tab-icon{font-size:19px;line-height:1;}
.tab-label{font-size:10px;font-weight:500;}

/* ══════════════ DESKTOP LAYOUT (≥ 768px) ════════════════ */
@media(min-width:768px){
  #app{flex-direction:row;min-height:100vh;}

  /* Sidebar */
  .mob-header{display:none;}
  .tabbar{display:none;}
  .mob-content{padding:28px 32px 28px;}

  .sidebar{
    width:var(--sidebar);flex-shrink:0;
    background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
  .sidebar-badge{width:44px;height:44px;background:var(--navy-dim);
    border:1px solid rgba(45,91,227,.3);border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;color:var(--navy-light);margin-bottom:10px;}
  .sidebar-title{font-weight:700;font-size:14px;line-height:1.3;}
  .sidebar-sub{font-size:11px;color:var(--muted);margin-top:3px;}

  .sidebar-nav{flex:1;padding:12px 10px;}
  .nav-btn{width:100%;display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:var(--r);border:none;background:transparent;
    color:var(--muted);font-size:13px;font-weight:500;text-align:left;
    transition:background .15s,color .15s;margin-bottom:2px;}
  .nav-btn:hover{background:var(--surface2);color:var(--text);}
  .nav-btn.active{background:var(--navy-dim);color:var(--navy-light);font-weight:600;}
  .nav-btn .n-icon{font-size:17px;flex-shrink:0;}

  .sidebar-footer{padding:16px 10px;border-top:1px solid var(--border);}
  .sidebar-exit{width:100%;display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:var(--r);border:none;background:transparent;
    color:var(--muted);font-size:13px;text-align:left;cursor:pointer;}
  .sidebar-exit:hover{background:var(--surface2);color:var(--text);}

  /* Desktop main area */
  .desk-main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .desk-topbar{background:var(--surface);border-bottom:1px solid var(--border);
    padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
  .desk-page-title{font-size:18px;font-weight:700;}
  .desk-page-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .desk-actions{display:flex;gap:8px;align-items:center;}

  /* KPI goes 4 wide on desktop */
  .kpi-grid{grid-template-columns:repeat(4,1fr);}
  .kpi-card{padding:20px 18px;}
  .kpi-value{font-size:22px;}

  /* 2-col layout for resumen on desktop */
  .desk-two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .desk-two-col .section{margin-bottom:0;}

  /* Student grid — 2 cols on desktop */
  .s-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .s-row-grid .s-row{margin-bottom:0;}

  /* Sheet becomes a centered dialog on desktop */
  .overlay{align-items:center;}
  .sheet{border-radius:var(--r-lg);max-width:480px;max-height:88vh;
    border:1px solid var(--border2);}
  .sheet-handle{display:none;}
}

@media(min-width:1100px){
  :root{--sidebar:240px;}
  .mob-content{padding:32px 40px;}
  .desk-topbar{padding:18px 40px;}
}

/* ══════════════ SHARED COMPONENTS ═══════════════════════ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 14px;}
.kpi-icon{font-size:22px;margin-bottom:8px;}
.kpi-value{font-size:18px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:500;}

.section{margin-bottom:24px;}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.empty{color:var(--subtle);font-size:13px;text-align:center;padding:22px 0;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:8px;}
.card-title{font-weight:600;font-size:15px;}
.card-meta{color:var(--muted);font-size:12px;margin-top:3px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.pct-badge{font-size:12px;font-weight:700;color:var(--yellow);background:var(--yellow-dim);
  border-radius:6px;padding:3px 9px;flex-shrink:0;border:1px solid rgba(245,200,66,.2);}
.prog-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.card-footer{display:flex;justify-content:space-between;font-size:11px;}

.list-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.row-name{font-size:14px;}
.row-val{font-size:13px;font-weight:600;flex-shrink:0;margin-left:12px;}
.row-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.add-btn{width:100%;padding:13px;margin-top:6px;background:transparent;
  border:1.5px dashed var(--border2);border-radius:var(--r);color:var(--navy-light);font-size:13px;font-weight:500;}
.icon-btn{background:var(--surface2);border:1px solid var(--border);font-size:15px;padding:7px 9px;border-radius:8px;color:var(--muted);}
.primary-btn{padding:9px 16px;border-radius:8px;background:var(--navy);border:none;color:#fff;font-size:13px;font-weight:600;}

.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{padding:8px 16px;border-radius:20px;border:1px solid var(--border2);white-space:nowrap;
  font-size:12px;font-weight:500;flex-shrink:0;background:transparent;color:var(--muted);}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.pill.new-pill{border-style:dashed;color:var(--navy-light);}

.s-row{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:6px;text-align:left;}
.s-row:active{opacity:.6;}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.s-name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.s-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.s-status{font-size:12px;font-weight:600;flex-shrink:0;}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.f-cat{padding:7px 14px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;
  font-size:12px;font-weight:500;flex-shrink:0;background:transparent;color:var(--muted);}
.f-cat.active{background:var(--yellow-dim);color:var(--yellow);border-color:rgba(245,200,66,.3);}

.total-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}

.alumno-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;}
.alumno-num{width:28px;height:28px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);flex-shrink:0;font-weight:600;}
.alumno-name{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;}
.badge-owed{background:var(--red-dim);color:var(--red);}
.badge-ok{background:var(--green-dim);color:var(--green);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease;}
.sheet{background:var(--surface);border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;
  overflow-y:auto;animation:slideUp .2s ease;padding-bottom:12px;}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 0;}
.sheet-bar{width:36px;height:3px;border-radius:2px;background:var(--border2);}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0;}
.sheet-title{font-weight:700;font-size:17px;}
.sheet-close{background:var(--surface2);border:none;color:var(--muted);font-size:18px;
  border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:16px 20px;}
.sheet-footer{display:flex;gap:8px;padding:0 20px 16px;}
.btn-cancel{flex:1;padding:14px;background:transparent;border:1px solid var(--border2);
  border-radius:var(--r);color:var(--muted);font-size:14px;font-weight:500;}
.btn-save{flex:2;padding:14px;background:var(--navy);border:none;border-radius:var(--r);
  color:#fff;font-size:14px;font-weight:600;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:500;}
.field input,.field select{width:100%;padding:13px 14px;background:var(--bg);
  border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);
  font-size:15px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--navy);}

.pay-header{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.pay-student{font-weight:700;font-size:16px;}
.pay-quota{color:var(--navy-light);font-size:12px;margin-top:4px;}
.pay-hist{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.pay-hist-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600;}
.pay-hist-row{display:flex;gap:10px;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center;}
.pay-total-line{color:var(--muted);font-size:12px;margin-top:10px;}
.del-pay{background:transparent;border:none;color:var(--muted);font-size:16px;padding:0 4px;margin-left:auto;}
.pay-done{text-align:center;color:var(--green);padding:24px 0;font-size:15px;font-weight:500;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  padding:11px 22px;border-radius:20px;font-size:13px;font-weight:500;
  z-index:200;white-space:nowrap;animation:fadeIn .2s ease;}
.toast.ok{background:var(--surface2);border:1px solid var(--border2);color:var(--text);}
.toast.err{background:var(--red-dim);border:1px solid var(--red);color:var(--red);}
@media(min-width:768px){
  .toast{bottom:24px;}
}

/* ── Morosos ── */
.moroso-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;}
.moroso-card:active{opacity:.7;}
.moroso-name{font-weight:600;font-size:14px;margin-bottom:8px;}
.moroso-total{color:var(--red);font-weight:700;font-size:16px;}
.moroso-desglose{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.moroso-item{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0;}

/* ── Ficha alumno ── */
.ficha-header{background:var(--surface2);border-radius:var(--r);padding:16px;margin-bottom:16px;text-align:center;}
.ficha-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.ficha-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.ficha-stat{background:var(--bg);border-radius:8px;padding:10px;text-align:center;}
.ficha-stat-val{font-size:15px;font-weight:700;}
.ficha-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.ficha-quota-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.ficha-note-area{width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;resize:none;outline:none;font-family:'Roboto',sans-serif;min-height:80px;}

/* ── Borrador ── */
.draft-badge{background:rgba(245,200,66,.15);color:var(--yellow);border:1px solid rgba(245,200,66,.3);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.draft-card{background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--r);padding:15px;margin-bottom:8px;opacity:.85;}

/* ── Money input ── */
.money-display{position:relative;}
.money-display input{padding-right:40px;}
.money-display::after{content:attr(data-fmt);position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;}

/* ── Log ── */
.log-row{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.log-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.log-desc{flex:1;font-size:13px;line-height:1.4;}
.log-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.log-del{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;}
.log-del:hover{color:var(--red);}

/* ── Búsqueda ── */
.search-box{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:'Roboto',sans-serif;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}

/* ── Lote ── */
.lote-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--navy-dim);border:1px solid rgba(45,91,227,.3);border-radius:var(--r);margin-bottom:10px;}
.lote-check{width:18px;height:18px;accent-color:var(--navy);flex-shrink:0;cursor:pointer;}
</style>
<script>
  const _FB_URL = "https://bsg-7772d-default-rtdb.firebaseio.com/comite4b";
  let _fbLastHash = null;
  let _fbSaveTs = 0;

  window._fbSave = function(s) {
    _fbSaveTs = Date.now();
    const body = JSON.stringify(s);
    _fbLastHash = body;
    window._fbSetStatus("💾 Guardando...", "#f5c842");
    fetch(_FB_URL + ".json", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: body
    })
    .then(function(r){
      if(r.ok){ window._fbSetStatus("☁️ Guardado", "#3dd68c"); }
      else{ r.text().then(function(t){ window._fbSetStatus("❌ Error "+r.status+": "+t.slice(0,40), "#f16060"); console.error("FB save error:", r.status, t); }); }
    })
    .catch(function(e){ window._fbSetStatus("❌ Sin conexión", "#f16060"); console.error("FB save:", e); });
  };

  window._fbSetStatus = function(msg, color) {
    ["fb-status-mob","fb-status-desk"].forEach(function(id){
      var el = document.getElementById(id);
      if(el){ el.textContent = msg; el.style.color = color; }
    });
  };

  window._fbStartPolling = function(onRemoteChange) {
    window._fbSetStatus("⏳ Conectando...", "#7a85a0");
    fetch(_FB_URL + ".json")
      .then(function(r){ return r.json(); })
      .then(function(val){
        _fbLastHash = JSON.stringify(val);
        window._fbSetStatus("☁️ Conectado", "#3dd68c");
        onRemoteChange(mergeState(val));
      })
      .catch(function(e){ console.error("FB load:", e); window._fbSetStatus("❌ Sin conexión", "#f16060"); onRemoteChange(null); });

    setInterval(function() {
      if(Date.now() - _fbSaveTs < 5000) return;
      fetch(_FB_URL + ".json")
        .then(function(r){ return r.json(); })
        .then(function(val){
          var h = JSON.stringify(val);
          if(h !== _fbLastHash){ _fbLastHash = h; onRemoteChange(mergeState(val)); }
        })
        .catch(function(e){ console.error("FB poll:", e); });
    }, 6000);
  };
</script>
</head>
<body>

<!-- LOGIN (hidden - only used for admin upgrade via requireAdmin) -->
<div id="login" class="hidden">
  <div class="login-card">
    <div class="login-badge">4°B</div>
    <div class="login-title">Comité Delegados</div>

<script>
const PIN="4B4B";
let isAdmin=false;
const INIT_STUDENTS=["ACEVEDO BAVESTRELLO, IGNACIA ALEGRÍA","AGUILERA CÉSPEDES, DIEGO BENJAMIN","BERNSTEIN COFRE, ALICIA","BIANCHI ROJAS, MARTINA GABRIELA","BOETSCH LOPÉPE, DIEGO","BRICEÑO CARRILLO, LAURA","CÁCERES MANZUR, MARTÍN ANDRÉS","CORTES SAAVEDRA, AMELIA","CRUZ YÁÑEZ, BENJAMÍN IGNACIO","ECHENIQUE GALMEZ, BORJA FRANCISCO","EGAÑA PANTOJA, LUPE","ETCHEGARAY EYZAGUIRRE, MANUEL","FERNÁNDEZ BUSTOS, OLIVIA MARIA","GONZÁLEZ ROJAS, CLEMENTE","GRENCI APARICIO, LUCAS","HARTARD CUENTAS-ZAVALA, BELTRAN","ILLINO HARISMENDY, MARTIN","LLEDÓ GIL, TOMÁS","LORCA FERRER, CLEMENTE IGNACIO","LOVERA LOPEZ, GUILLERMO ANDRES","MAJLUF URZUA, JUAN JOSÉ","MARTINEZ DE MUSSY, CLARISA","MEDINA COMANDARI, PEDRO","QUINZIO ANDRADE, NINA","RAMÍREZ AGUILA, RAIMUNDO IGNACIO","REPETTO URMENETA, NICOLÁS","REYES GARCIA, PASCUALA","ROSSELOT SARRÁS, TRINIDAD MARIA","ROUANET RODRIGUEZ, VICENTE","SILVA HÜBNER, SANTIAGO ANDRÉS","TARDEL SWETT, ADELA","TIKHONOV ORMEÑO, EMILIA MARIA","URBINA GALARCE, DIEGO IGNACIO","URIBE BUSTOS, TRINIDAD IGNACIA MARIA","VARGAS MONTEIRO, JOSEFINA ANTONIA","VEGA BURMEISTER, MATILDE","VILLENA SANHUEZA, AGUSTÍN PATRICIO","VON MÜHLENBROCK HOCES DE LA GUARDIA, PEDRO"];
let state,currentTab="resumen",pagosSelQuota=null,gastosSelCat="all";
const isDesktop=()=>window.innerWidth>=768;
function uid(){return Math.random().toString(36).slice(2,10);}
function fmt(n){return new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(n);}
function hoy(){return new Date().toISOString().slice(0,10);}
function blankState(){return{students:INIT_STUDENTS.map((name,i)=>({id:"s"+i,name})),quotas:[],payments:[],expenses:[],log:[]};}
function toArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  // Firebase stores arrays as {0:{...}, 1:{...}} when saved via PUT
  return Object.values(v);
}
function mergeState(val){
  var b=blankState();
  if(!val) return b;
  return {
    students: toArr(val.students).length ? toArr(val.students) : b.students,
    quotas:   toArr(val.quotas).map(q=>({...q,amounts:q.amounts&&typeof q.amounts==='object'&&!Array.isArray(q.amounts)?q.amounts:{},studentIds:toArr(q.studentIds)})),
    payments: toArr(val.payments),
    expenses: toArr(val.expenses),
    log:      toArr(val.log)
  };
}
function saveData(){if(window._fbSave)window._fbSave(state);}
function addLog(icon,desc){
  if(!state.log)state.log=[];
  const ts=new Date().toISOString();
  state.log.unshift({id:uid(),icon,desc,ts});
  if(state.log.length>200)state.log=state.log.slice(0,200); // cap at 200 entries
}
function fmtTs(ts){
  const d=new Date(ts);
  return d.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit"})+' '+d.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
}

document.getElementById("pin-input").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

function startApp(admin){
  isAdmin = !!admin;
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  applyLayout();
  updateAdminUI();
  var loadingHtml='<div style="text-align:center;padding:60px 0;color:var(--muted)">⏳ Conectando...</div>';
  document.getElementById("content-mob").innerHTML=loadingHtml;
  document.getElementById("content-desk").innerHTML=loadingHtml;
  window._fbStartPolling(function(val){
    state=mergeState(val);
    render();
  });
}

function updateAdminUI(){
  // Show/hide admin badge in header
  var badge=document.getElementById("admin-badge");
  if(badge) badge.style.display=isAdmin?"inline-flex":"none";
  var pubBadge=document.getElementById("pub-badge");
  if(pubBadge) pubBadge.style.display=isAdmin?"none":"inline-flex";
  var adminBtn=document.getElementById("desk-admin-btn");
  if(adminBtn) adminBtn.style.display=isAdmin?"none":"flex";
  ["desk-backup-btn","desk-restore-btn"].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.display=isAdmin?"flex":"none";
  });
  // Show/hide log tab (admin only)
  ["tab-log","nav-log"].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.display=isAdmin?"":"none";
  });
}

function doLogin(){
  const v=document.getElementById("pin-input").value.toUpperCase();
  if(v===PIN){
    sessionStorage.setItem("auth","1");
    startApp(true);
  } else {
    document.getElementById("pin-input").classList.add("err");
    document.getElementById("pin-err").classList.remove("hidden");
    document.getElementById("pin-input").value="";
    setTimeout(()=>{document.getElementById("pin-input").classList.remove("err");document.getElementById("pin-err").classList.add("hidden");},1500);
  }
}
function doLogout(){
  if(isAdmin){
    isAdmin=false;
    sessionStorage.removeItem("auth");
    updateAdminUI();
    render();
    showToast("Modo Delegados cerrado");
  } else {
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("pin-input").value="";
  }
}
function requireAdmin(fn){
  if(isAdmin){ fn(); return; }
  // Show PIN prompt inline
  openSheet("🔐 Acceso Delegados",
    '<div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px">Ingresa el PIN del comité para continuar</div>'+
    '<div class="field"><input id="admin-pin" type="password" placeholder="••••" maxlength="8" style="width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:22px;text-align:center;outline:none;letter-spacing:8px;" autocomplete="off"></div>'+
    '<div id="admin-pin-err" style="color:var(--red);font-size:12px;text-align:center;display:none">PIN incorrecto</div>',
    "checkAdminPin()"
  );
  window._pendingAdminFn=fn;
}
function checkAdminPin(){
  const v=document.getElementById("admin-pin").value.toUpperCase();
  if(v===PIN){
    isAdmin=true;
    sessionStorage.setItem("auth","1");
    updateAdminUI();
    closeSheet();
    showToast("✓ Modo Delegados activado");
    if(window._pendingAdminFn){ window._pendingAdminFn(); window._pendingAdminFn=null; }
  } else {
    document.getElementById("admin-pin-err").style.display="block";
    document.getElementById("admin-pin").value="";
  }
}

// Auto-restore admin session on F5
if(sessionStorage.getItem("auth")==="1"){ startApp(true); }
// Always start app publicly (no login wall)
else { startApp(false); }

// Layout switching
function applyLayout(){
  var desk=isDesktop();
  document.getElementById("sidebar").style.display=desk?"flex":"none";
  document.getElementById("desk-main").style.display=desk?"flex":"none";
  document.getElementById("mob-header").style.display=desk?"none":"flex";
  document.getElementById("content-mob").style.display=desk?"none":"block";
  document.getElementById("tabbar").style.display=desk?"none":"flex";
  document.getElementById("app").style.flexDirection=desk?"row":"column";
}
window.addEventListener("resize",()=>{if(state){applyLayout();render();}});

const TAB_META={
  resumen:{title:"Resumen",sub:"Vista general del fondo",action:null},
  pagos:{title:"Pagos",sub:"Estado de cobros por cuota",action:'<button class="primary-btn" onclick="requireAdmin(openAddQuota)">＋ Nueva cuota</button>'},
  gastos:{title:"Gastos",sub:"Registro de egresos del fondo",action:'<button class="primary-btn" onclick="requireAdmin(openAddExpense)">＋ Registrar gasto</button>'},
  alumnos:{title:"Alumnos",sub:"Lista de 4°B",action:'<button class="primary-btn" onclick="requireAdmin(openAddStudent)">＋ Alumno</button>'},
  pendientes:{title:"Pendientes",sub:"Familias con saldo pendiente",action:null},
  log:{title:"Log de movimientos",sub:"Historial de todas las acciones",action:null},
};

function switchTab(t){
  // Block log tab in public mode
  if(t==="log"&&!isAdmin){ showToast("Solo disponible en Modo Delegados","err"); return; }
  currentTab=t;
  // Reset search on tab change
  if(t!=="pagos") pagosSearch="";
  if(t!=="alumnos") alumnosSearch="";
  if(t!=="pendientes") pendientesSearch="";
  if(t!=="gastos") gastosSearch="";
  // mobile
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const mob=document.getElementById("tab-"+t);if(mob)mob.classList.add("active");
  // desktop
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const nav=document.getElementById("nav-"+t);if(nav)nav.classList.add("active");
  render();
}

function getContent(){
  if(currentTab==="resumen")return renderResumen();
  if(currentTab==="pagos")return renderPagos();
  if(currentTab==="gastos")return renderGastos();
  if(currentTab==="alumnos")return renderAlumnos();
  if(currentTab==="pendientes")return renderPendientes();
  if(currentTab==="log")return renderLog();
  return "";
}

function render(){
  const html=getContent();
  if(isDesktop()){
    document.getElementById("content-desk").innerHTML=html;
    const meta=TAB_META[currentTab];
    document.getElementById("desk-title").textContent=meta.title;
    document.getElementById("desk-sub").textContent=meta.sub;
    document.getElementById("desk-actions").innerHTML=meta.action||"";
  } else {
    document.getElementById("content-mob").innerHTML=html;
  }
}

function getSP(sid,qid){return state.payments.filter(p=>p.studentId===sid&&p.quotaId===qid);}
function isInQuota(sid,q){
  if(!q.studentIds||q.studentIds.length===0)return true;
  return q.studentIds.includes(sid);
}
function getStudentAmount(sid,q){
  // Returns the amount this specific student owes for this quota
  if(q.amounts&&q.amounts[sid]!==undefined)return q.amounts[sid];
  return q.amount;
}
function isPaid(sid,qid){
  const q=state.quotas.find(q=>q.id===qid);
  if(!q)return false;
  if(!isInQuota(sid,q))return true; // not in quota = considered "ok"
  const amt=getStudentAmount(sid,q);
  return getSP(sid,qid).reduce((s,p)=>s+p.amount,0)>=amt;
}
function getQuotaStudents(q){
  if(q.studentIds&&q.studentIds.length>0) return state.students.filter(s=>q.studentIds.includes(s.id));
  return state.students;
}
function qStats(qid){
  const q=state.quotas.find(q=>q.id===qid);
  if(!q)return{paid:0,pending:0,collected:0,expected:0,total:0};
  const qs=getQuotaStudents(q);
  const paid=qs.filter(s=>isPaid(s.id,qid)).length;
  const collected=state.payments.filter(p=>p.quotaId===qid).reduce((s,p)=>s+p.amount,0);
  const expected=qs.reduce((x,s)=>x+getStudentAmount(s.id,q),0);
  return{paid,pending:qs.length-paid,collected,expected,total:qs.length};
}

function renderResumen(){
  const tot=state.payments.reduce((s,p)=>s+p.amount,0);
  const gas=state.expenses.reduce((s,e)=>s+e.amount,0);
  const bal=tot-gas;
  const debtors=state.students.map(s=>({...s,owed:state.quotas.filter(q=>!q.draft&&isInQuota(s.id,q)&&!isPaid(s.id,q.id)).reduce((x,q)=>x+getStudentAmount(s.id,q),0)})).filter(s=>s.owed>0).sort((a,b)=>b.owed-a.owed);

  let html=`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-value" style="color:#3dd68c">${fmt(tot)}</div><div class="kpi-label">Recaudado</div></div>
    <div class="kpi-card"><div class="kpi-icon">🧾</div><div class="kpi-value" style="color:#f5c842">${fmt(gas)}</div><div class="kpi-label">Gastos</div></div>
    <div class="kpi-card"><div class="kpi-icon">⚖️</div><div class="kpi-value" style="color:${bal>=0?"#5b82f0":"#f16060"}">${fmt(bal)}</div><div class="kpi-label">Balance</div></div>
    <div class="kpi-card"><div class="kpi-icon">👥</div><div class="kpi-value">${state.students.length}</div><div class="kpi-label">Alumnos</div></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
    <button onclick="shareImage(null)" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--green-dim);border:1px solid var(--green);border-radius:var(--r);color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:Roboto,sans-serif">📸 Compartir resumen</button>
  </div>`;

  // Flujo proyectado
  const activeQuotas2=state.quotas.filter(q=>!q.draft);
  const draftQuotas=state.quotas.filter(q=>q.draft);
  const porRecaudar=activeQuotas2.reduce((sum,q)=>{
    const qs=getQuotaStudents(q);
    const collected=state.payments.filter(p=>p.quotaId===q.id).reduce((s,p)=>s+p.amount,0);
    const expected=qs.reduce((x,s)=>x+getStudentAmount(s.id,q),0);
    return sum+(expected-collected);
  },0);
  const draftTotal=draftQuotas.reduce((sum,q)=>{
    const qs=getQuotaStudents(q);
    return sum+qs.reduce((x,s)=>x+getStudentAmount(s.id,q),0);
  },0);
  const balProyectado=tot+porRecaudar+(flujoDrafts?draftTotal:0)-gas;

  html+=`<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="sec-title" style="margin:0">📈 Flujo proyectado</div>
    ${draftQuotas.length?`<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer"><input type="checkbox" ${flujoDrafts?"checked":""} onchange="flujoDrafts=this.checked;render()" style="accent-color:var(--navy);width:14px;height:14px"> Incluir borradores</label>`:""}
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
    <div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--muted)">💰 Recaudado</span><span style="font-size:13px;font-weight:600;color:#3dd68c">${fmt(tot)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--muted)">📥 Por recaudar</span><span style="font-size:13px;font-weight:600;color:#5b82f0">${fmt(porRecaudar)}</span></div>
    ${flujoDrafts&&draftTotal>0?`<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--muted)">📝 Borradores</span><span style="font-size:13px;font-weight:600;color:#f5c842">${fmt(draftTotal)}</span></div>`:""}
    <div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--muted)">🧾 Gastos</span><span style="font-size:13px;font-weight:600;color:#f97316">${fmt(gas)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:13px 14px;background:${balProyectado>=0?"rgba(61,214,140,.05)":"rgba(241,96,96,.05)"}"><span style="font-size:13px;font-weight:700">Balance proyectado</span><span style="font-size:15px;font-weight:700;color:${balProyectado>=0?"#3dd68c":"#f16060"}">${fmt(balProyectado)}</span></div>
  </div></div>`;

  const isDesk=isDesktop();
  if(isDesk) html+=`<div class="desk-two-col">`;

  // Borradores
  const drafts=state.quotas.filter(q=>q.draft);
  if(drafts.length){
    html+=`<div class="section"><div class="sec-title">📝 Borradores (${drafts.length})</div>`;
    drafts.forEach(q=>{
      html+=`<div class="draft-card"><div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:600;font-size:14px">${q.name}</div><div style="color:var(--muted);font-size:12px;margin-top:2px">${fmt(q.amount)} · ${q.date}</div></div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="draft-badge">Borrador</span>
          <button class="icon-btn" onclick="requireAdmin(()=>openEditQuota('${q.id}'))" title="Editar">✏️</button>
          <button class="icon-btn" onclick="requireAdmin(()=>activateDraft('${q.id}'))" title="Activar cuota" style="background:var(--green-dim);border-color:var(--green);color:var(--green)">✓</button>
          <button class="icon-btn" onclick="requireAdmin(()=>deleteQuota('${q.id}'))">🗑️</button>
        </div>
      </div></div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="section"><div class="sec-title">📋 Cuotas activas</div>`;
  const activeQ=state.quotas.filter(q=>!q.draft);
  if(!activeQ.length)html+=`<div class="empty">Sin cuotas activas</div>`;

    const st=qStats(q.id);const pct=st.total>0?Math.round((st.paid/st.total)*100):0;

    <div class="card-footer"><span style="color:#3dd68c">✓ ${st.paid} pagaron</span><span style="color:#7a85a0">${st.pending} pendientes</span><span style="color:#7a85a0">${fmt(st.collected)}</span></div></div>`;
  });
  html+=`<button class="add-btn" onclick="requireAdmin(openAddQuota)">＋ Nueva cuota</button></div>`;

  html+=`<div>`;
  html+=`<div class="section"><div class="sec-title">⚠️ Pendientes (${debtors.length})</div>`;
  if(!debtors.length)html+=`<div class="empty">🎉 Todos al día</div>`;
  debtors.slice(0,8).forEach(s=>{html+=`<div class="list-row"><div class="row-name">${s.name}</div><div class="row-val" style="color:#f16060">${fmt(s.owed)}</div></div>`;});
  if(debtors.length>8)html+=`<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px 0">+${debtors.length-8} más en Pagos</div>`;
  html+=`</div>`;

  html+=`<div class="section"><div class="sec-title">💸 Últimos gastos</div>`;
  if(!state.expenses.length)html+=`<div class="empty">Sin gastos registrados</div>`;
  [...state.expenses].reverse().slice(0,5).forEach(e=>{html+=`<div class="list-row"><div><div class="row-name">${e.name}</div><div class="row-sub">${e.date} · ${e.category}</div></div><div class="row-val" style="color:#f5c842">${fmt(e.amount)}</div></div>`;});
  html+=`<button class="add-btn" onclick="requireAdmin(openAddExpense)">＋ Registrar gasto</button></div>`;
  html+=`</div>`;

  if(isDesk) html+=`</div>`;
  return html;
}

function renderPagos(){
  const activeQuotas=state.quotas.filter(x=>!x.draft);
  if(!pagosSelQuota&&activeQuotas.length)pagosSelQuota=activeQuotas[0].id;
  if(pagosSelQuota&&state.quotas.find(x=>x.id===pagosSelQuota)?.draft)pagosSelQuota=activeQuotas[0]?.id||null;
  const q=state.quotas.find(x=>x.id===pagosSelQuota);
  let html=`<div class="pills">`;
  state.quotas.filter(x=>!x.draft).forEach(x=>{html+=`<button class="pill${x.id===pagosSelQuota?" active":""}" onclick="selPagosQuota('${x.id}')">${x.name}</button>`;});
  html+=`<button class="pill new-pill" onclick="requireAdmin(openAddQuota)">＋ Nueva</button></div>`;
  if(!q){html+=`<div class="empty">Crea una cuota para empezar</div>`;return html;}
  const st=qStats(q.id);const pct=st.total>0?Math.round((st.paid/st.total)*100):0;

  // Header card
  html+=`<div class="card" style="margin-bottom:12px"><div class="card-top"><div style="flex:1;margin-right:8px"><div class="card-title">${q.name}</div><div class="card-meta">${fmt(q.amount)} por alumno · ${q.date}</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="icon-btn" title="Marcar en lote" onclick="requireAdmin(toggleLote)" style="${pagosLoteMode?"background:var(--navy);color:#fff;border-color:var(--navy)":""}">☑</button>
      <button class="icon-btn" onclick="requireAdmin(()=>openEditQuota('${q.id}'))">✏️</button>
      <button class="icon-btn" onclick="requireAdmin(()=>deleteQuota('${q.id}'))">🗑️</button>
    </div></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct===100?"#3dd68c":"#2d5be3"}"></div></div>
    <div class="card-footer"><span style="color:#3dd68c">✓ ${st.paid} pagaron</span><span style="color:#7a85a0">${st.pending} pendientes</span><span style="color:#7a85a0">${fmt(st.collected)}</span>
    <button onclick="shareImage('${q.id}')" style="background:var(--green-dim);border:1px solid var(--green);border-radius:8px;color:var(--green);font-size:11px;padding:4px 10px;cursor:pointer;font-family:Roboto,sans-serif;font-weight:600">📸</button>
    </div></div>`;

  // Lote bar
  if(pagosLoteMode){
    html+=`<div class="lote-bar">
      <span style="font-size:13px;color:var(--navy-light);font-weight:500">Modo lote — selecciona y registra</span>
      <button class="primary-btn" onclick="requireAdmin(()=>saveLote('${q.id}'))">Registrar pagos</button>
    </div>`;
  }

  // Filter pills
  html+=`<div style="display:flex;gap:6px;margin-bottom:10px">
    ${["todos","pagados","pendientes"].map(f=>`<button onclick="pagosFiltro='${f}';render()" style="padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:'Roboto',sans-serif;background:${pagosFiltro===f?"var(--navy)":"var(--surface2)"};color:${pagosFiltro===f?"#fff":"var(--muted)"}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join("")}
  </div>`;

  // Search box — no re-render on input, only CSS filtering
  html+=`<div class="search-wrap"><input class="search-box" id="pagos-search" type="text" placeholder="Buscar alumno..." value="${pagosSearch}" oninput="filterStudents(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>`;
  html+=`<div id="student-list-wrap">`;

  // Render ALL students with data-name attribute for CSS/JS filtering
  const wrap=isDesktop()&&!pagosLoteMode?`<div class="s-row-grid">`:"";
  const wrapEnd=isDesktop()&&!pagosLoteMode?`</div>`:"";
  html+=wrap;
  const searchLow=pagosSearch.toLowerCase();
  state.students.forEach(s=>{
    const inQuota=isInQuota(s.id,q);
    const paid=inQuota&&isPaid(s.id,q.id);
    const searchHide=searchLow&&!s.name.toLowerCase().includes(searchLow);
    const filtroHide=!inQuota
      ? pagosFiltro!=="todos"
      : (pagosFiltro==="pagados"&&!paid)||(pagosFiltro==="pendientes"&&paid);
    const vis=searchHide||filtroHide?"display:none;":"";

    if(!inQuota){
      html+=`<div class="s-row" data-sname="${s.name.toLowerCase()}" data-paid="na" style="opacity:.3;cursor:default;${vis}">
        <div class="s-dot" style="background:#2e3a55;border:2px dashed #334155"></div>
        <div style="flex:1;min-width:0"><div class="s-name" style="color:#eef0f5">${s.name}</div></div>
        <div class="s-status" style="color:#475569;font-size:11px">No aplica</div>
      </div>`;
      return;
    }
    const partial=getSP(s.id,q.id).reduce((x,p)=>x+p.amount,0);
    const isPart=partial>0&&!paid;
    const sAmt=getStudentAmount(s.id,q);
    const dotColor=paid?"#3dd68c":isPart?"#f5c842":"#2e3a55";
    const stColor=paid?"#3dd68c":isPart?"#f5c842":"#7a85a0";
    const stText=paid?"✓ Pagado":isPart?fmt(partial):"Pendiente";
    const paidKey=paid?"1":"0";

    if(pagosLoteMode&&!paid){
      html+=`<div class="s-row" data-sname="${s.name.toLowerCase()}" data-paid="${paidKey}" style="cursor:default;${vis}">
        <input type="checkbox" class="lote-check" id="lote-${s.id}">
        <div style="flex:1;min-width:0"><div class="s-name" style="color:#eef0f5">${s.name}</div>${isPart?`<div class="s-hint">Abonado ${fmt(partial)}</div>`:""}</div>
        <div class="s-status" style="color:${stColor}">${stText}</div>
      </div>`;
    } else {
      html+=`<button class="s-row" data-sname="${s.name.toLowerCase()}" data-paid="${paidKey}" onclick="requireAdmin(()=>openPayment('${s.id}','${q.id}'))" style="${vis}">
        <div class="s-dot" style="background:${dotColor}"></div>
        <div style="flex:1;min-width:0"><div class="s-name" style="color:#eef0f5">${s.name}</div>
          ${isPart?`<div class="s-hint">Abonado ${fmt(partial)} · falta ${fmt(sAmt-partial)}</div>`:""}
          ${(q.amounts&&q.amounts[s.id])?`<div class="s-hint" style="color:var(--yellow)">Monto especial: ${fmt(sAmt)}</div>`:""}
        </div>
        <div class="s-status" style="color:${stColor}">${stText}</div>
      </button>`;
    }
  });
  html+=wrapEnd;
  html+=`</div>`; // close student-list-wrap
  return html;
}
function selPagosQuota(id){pagosSelQuota=id;pagosSearch="";pagosLoteMode=false;pagosFiltro="todos";render();}
function toggleLote(){pagosLoteMode=!pagosLoteMode;render();}
function filterStudents(val){
  pagosSearch=val;
  const low=val.toLowerCase();
  const rows=document.querySelectorAll("#student-list-wrap [data-sname]");
  rows.forEach(function(r){
    const nameMatch=!low||r.dataset.sname.includes(low);
    const paid=r.dataset.paid;
    const filtroMatch=pagosFiltro==="todos"||(pagosFiltro==="pagados"&&paid==="1")||(pagosFiltro==="pendientes"&&paid==="0");
    r.style.display=(nameMatch&&filtroMatch)?"":"none";
  });
}
function saveLote(qid){
  const q=state.quotas.find(x=>x.id===qid);
  const checked=state.students.filter(s=>{
    const el=document.getElementById("lote-"+s.id);
    return el&&el.checked;
  });
  if(!checked.length){showToast("Selecciona al menos un alumno","err");return;}
  const date=hoy();
  let count=0;
  checked.forEach(s=>{
    if(!isPaid(s.id,qid)){
      const partial=getSP(s.id,qid).reduce((x,p)=>x+p.amount,0);
      const rem=getStudentAmount(s.id,q)-partial;
      if(rem>0){
        state.payments.push({id:uid(),studentId:s.id,quotaId:qid,amount:rem,date,note:"Pago en lote"});
        count++;
      }
    }
  });
  if(count>0){
    addLog("☑️",`Pago en lote: ${count} alumnos pagaron "${q.name}" — ${fmt(q.amount)} c/u`);
    saveData();pagosLoteMode=false;render();showToast(`✓ ${count} pagos registrados`);
  } else {
    showToast("Todos ya están pagados","err");
  }
}
function activateDraft(id){
  state.quotas=state.quotas.map(q=>q.id===id?{...q,draft:false}:q);
  addLog("📋",`Borrador activado como cuota: "${state.quotas.find(q=>q.id===id)?.name}"`);
  saveData();render();showToast("✓ Cuota activada");
}
function deleteQuota(id){const q=state.quotas.find(x=>x.id===id);if(!confirm("¿Eliminar \""+q.name+"\"?"))return;addLog("🗑️",`Cuota eliminada: "${q.name}"`);state.quotas=state.quotas.filter(x=>x.id!==id);state.payments=state.payments.filter(p=>p.quotaId!==id);if(pagosSelQuota===id)pagosSelQuota=state.quotas[0]?.id||null;saveData();render();showToast("Cuota eliminada");}

function saveAddQuota(){
  const name=document.getElementById("f-name").value.trim();
  const amount=getMoneyVal("f-amount");
  const date=document.getElementById("f-date").value;
  if(!name||!amount)return;
  let studentIds=[];
  let amounts={};
  const amtMode=document.getElementById("q-amt-mode-val")?.value||"equal";
  if(!window._quotaAllStudents){
    studentIds=state.students.filter(s=>document.getElementById("qsid-"+s.id)?.checked).map(s=>s.id);
    if(studentIds.length===0)return;
  }
  const targetStudents=studentIds.length>0?studentIds:state.students.map(s=>s.id);
  if(amtMode==="perperson"){
    const pp=getMoneyVal("q-price-pp");
    if(pp>0){
      targetStudents.forEach(sid=>{
        const el=document.getElementById("qpp-"+sid);
        const persons=el?parseInt(el.textContent)||2:2;
        const total=pp*persons;
        if(total!==amount)amounts[sid]=total;
      });
    }
  } else if(amtMode==="exceptions"){
    // Save only values that differ from base amount
    targetStudents.forEach(sid=>{
      const v=getMoneyVal("qexc-"+sid);
      if(v>0&&v!==amount) amounts[sid]=v;
      // if v===amount, no custom amount needed (uses base)
    });
  }
  const hasCustom=Object.keys(amounts).length>0;
  const isDraft=document.getElementById("q-is-draft")?.value==="1"||window._isDraft||false;
  state.quotas.push({id:uid(),name,amount,date,studentIds,amounts:hasCustom?amounts:{},draft:isDraft});
  addLog(isDraft?"📝":"📋",`Cuota ${isDraft?'(borrador)':''}creada: "${name}" — ${fmt(amount)} base`);
  saveData();closeSheet();render();showToast(isDraft?"✓ Borrador guardado":"✓ Cuota creada");
}

function renderPendientes(){
  const morosos = state.students.map(s=>{
    const desglose = state.quotas
      .filter(q=>!q.draft&&isInQuota(s.id,q)&&!isPaid(s.id,q.id))
      .map(q=>{
        const partial=getSP(s.id,q.id).reduce((x,p)=>x+p.amount,0);
        const falta=q.amount-partial;
        return {name:q.name, falta, partial};
      });
    const owed=desglose.reduce((x,d)=>x+d.falta,0);
    return {...s,owed,desglose};
  }).filter(s=>s.owed>0).sort((a,b)=>b.owed-a.owed);

  if(!morosos.length) return `<div class="empty" style="padding:60px 0">🎉 No hay alumnos pendientes — todos al día</div>`;

  let html=`<div class="search-wrap" style="margin-bottom:12px"><input class="search-box" type="text" placeholder="Buscar alumno..." value="${pendientesSearch}" oninput="filterPendientes(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>`;
  html+=`<div style="color:var(--muted);font-size:12px;margin-bottom:10px">${morosos.length} alumnos con cuotas pendientes</div>`;
  html+=`<div id="pendientes-list">`;
  morosos.forEach((s,i)=>{
    const hidden=pendientesSearch&&!s.name.toLowerCase().includes(pendientesSearch.toLowerCase())?"display:none;":"";
    html+=`<div class="moroso-card" data-mname="${s.name.toLowerCase()}" style="${hidden}" onclick="openFicha('${s.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:2px">#${i+1}</div>
          <div class="moroso-name">${s.name}</div>
        </div>
        <div class="moroso-total">${fmt(s.owed)}</div>
      </div>
      <div class="moroso-desglose">
        ${s.desglose.map(d=>`
          <div class="moroso-item">
            <span>${d.name}</span>
            <span style="color:var(--red)">${fmt(d.falta)}${d.partial>0?` <span style="color:var(--muted);font-size:10px">(abonó ${fmt(d.partial)})</span>`:""}</span>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function moneyInput(label,id,placeholder,value=""){
  return `<div class="field">
    <label>${label}</label>
    <input id="${id}" type="text" inputmode="numeric" placeholder="${placeholder||"ej: 5.000"}"
      value="${value?fmtNum(value):""}"
      oninput="formatMoneyInput(this)"
      style="width:100%;padding:13px 14px;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:15px;outline:none;font-family:Roboto,sans-serif">
  </div>`;
}
function fmtNum(n){return new Intl.NumberFormat("es-CL").format(n);}
function formatMoneyInput(el){
  const raw=el.value.replace(/\D/g,"");
  el.value=raw?fmtNum(parseInt(raw)):"";
  el._rawValue=raw?parseInt(raw):0;
}
function getMoneyVal(id){
  const el=document.getElementById(id);
  if(!el)return 0;
  // Always recompute from current value to handle paste/autofill
  const raw=el.value.replace(/[^\d]/g,"");
  const v=parseInt(raw)||0;
  el._rawValue=v;
  return v;
}

function downloadBackup(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="comite4b_backup_"+hoy()+".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("✓ Backup descargado");
}
function openRestore(){
  document.getElementById("restore-file-input").click();
}
function handleRestoreFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.students||!parsed.quotas){showToast("❌ Archivo inválido","err");return;}
      if(!confirm("¿Restaurar datos? Esto reemplazará TODO el estado actual."))return;
      state=mergeState(parsed);
      saveData();render();
      addLog("📂","Datos restaurados desde backup JSON");
      showToast("✓ Datos restaurados");
    }catch(err){
      showToast("❌ Error al leer el archivo","err");
    }
    input.value="";
  };
  reader.readAsText(file);
}

function shareImage(quotaId){
  const canvas=document.getElementById("share-canvas");
  const ctx=canvas.getContext("2d");
  const W=800, pad=40;

  // Gather data
  let lines=[];
  let title="";
  let subtitle="";

  if(quotaId){
    // Single quota view
    const q=state.quotas.find(x=>x.id===quotaId);
    if(!q)return;
    const qs=getQuotaStudents(q);
    const paidList=qs.filter(s=>isPaid(s.id,q.id));
    const pendList=qs.filter(s=>!isPaid(s.id,q.id));
    const collected=state.payments.filter(p=>p.quotaId===q.id).reduce((s,p)=>s+p.amount,0);
    const expected=qs.reduce((x,s)=>x+getStudentAmount(s.id,q),0);
    title=q.name;
    subtitle=fmt(q.amount)+" · "+q.date;
    lines=[
      {type:"stat", label:"✓ Pagaron", value:paidList.length+"/"+qs.length, color:"#3dd68c"},
      {type:"stat", label:"💰 Recaudado", value:fmt(collected), color:"#3dd68c"},
      {type:"stat", label:"⏳ Pendiente", value:fmt(expected-collected), color:"#f16060"},
      {type:"divider"},
      {type:"section", label:"⏳ Pendientes ("+pendList.length+")"},
      ...pendList.map(s=>{
        const partial=getSP(s.id,q.id).reduce((x,p)=>x+p.amount,0);
        const sAmt=getStudentAmount(s.id,q);
        return {type:"row", name:s.name, value:partial>0?"Abonó "+fmt(partial)+" · falta "+fmt(sAmt-partial):"Debe "+fmt(sAmt), color:"#f16060"};
      }),
      {type:"section", label:"✓ Pagaron ("+paidList.length+")"},
      ...paidList.map(s=>({type:"row", name:s.name, value:"✓ Pagado", color:"#3dd68c"})),
    ];
  } else {
    // General summary
    const tot=state.payments.reduce((s,p)=>s+p.amount,0);
    const gas=state.expenses.reduce((s,e)=>s+e.amount,0);
    const activeQ=state.quotas.filter(q=>!q.draft);
    const porRecaudar=activeQ.reduce((sum,q)=>{
      const qs=getQuotaStudents(q);
      const collected=state.payments.filter(p=>p.quotaId===q.id).reduce((s,p)=>s+p.amount,0);
      const expected=qs.reduce((x,s)=>x+getStudentAmount(s.id,q),0);
      return sum+(expected-collected);
    },0);
    title="Comité 4°B — Saint George's";
    subtitle="Estado del fondo · "+hoy();
    lines=[
      {type:"stat", label:"💰 Recaudado", value:fmt(tot), color:"#3dd68c"},
      {type:"stat", label:"📥 Por recaudar", value:fmt(porRecaudar), color:"#5b82f0"},
      {type:"stat", label:"🧾 Gastos", value:fmt(gas), color:"#f5c842"},
      {type:"stat", label:"⚖️ Balance", value:fmt(tot-gas), color:tot-gas>=0?"#3dd68c":"#f16060"},
      {type:"divider"},
      ...activeQ.map(q=>{
        const st=qStats(q.id);
        const pct=st.total>0?Math.round((st.paid/st.total)*100):0;
        return {type:"quota", name:q.name, pct, paid:st.paid, total:st.total, collected:st.collected};
      }),
    ];
  }

  // Calculate height
  let H=pad*2+80+40; // header
  lines.forEach(l=>{
    if(l.type==="stat") H+=44;
    else if(l.type==="divider") H+=20;
    else if(l.type==="section") H+=36;
    else if(l.type==="row") H+=34;
    else if(l.type==="quota") H+=52;
  });
  H=Math.max(H,300);

  canvas.width=W;
  canvas.height=H;

  // Background
  ctx.fillStyle="#0f1117";
  ctx.fillRect(0,0,W,H);

  // Header card
  ctx.fillStyle="#181c26";
  roundRect(ctx,pad,pad,W-pad*2,80,12);
  ctx.fillStyle="#eef0f5";
  ctx.font="bold 22px Roboto, Arial, sans-serif";
  ctx.fillText(title,pad+16,pad+32);
  ctx.fillStyle="#7a85a0";
  ctx.font="14px Roboto, Arial, sans-serif";
  ctx.fillText(subtitle,pad+16,pad+56);

  let y=pad+80+16;

  lines.forEach(l=>{
    if(l.type==="stat"){
      ctx.fillStyle="#181c26";
      roundRect(ctx,pad,y,W-pad*2,36,8);
      ctx.fillStyle="#7a85a0";
      ctx.font="13px Roboto, Arial, sans-serif";
      ctx.fillText(l.label,pad+12,y+23);
      ctx.fillStyle=l.color||"#eef0f5";
      ctx.font="bold 14px Roboto, Arial, sans-serif";
      const vw=ctx.measureText(l.value).width;
      ctx.fillText(l.value,W-pad-12-vw,y+23);
      y+=44;
    } else if(l.type==="divider"){
      ctx.strokeStyle="#252d42";
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad,y+8);ctx.lineTo(W-pad,y+8);ctx.stroke();
      y+=20;
    } else if(l.type==="section"){
      ctx.fillStyle="#7a85a0";
      ctx.font="bold 12px Roboto, Arial, sans-serif";
      ctx.fillText(l.label.toUpperCase(),pad,y+20);
      y+=36;
    } else if(l.type==="row"){
      ctx.fillStyle="#181c26";
      roundRect(ctx,pad,y,W-pad*2,26,6);
      ctx.fillStyle="#eef0f5";
      ctx.font="12px Roboto, Arial, sans-serif";
      ctx.fillText(l.name,pad+10,y+18);
      ctx.fillStyle=l.color||"#7a85a0";
      ctx.font="12px Roboto, Arial, sans-serif";
      const vw=ctx.measureText(l.value).width;
      ctx.fillText(l.value,W-pad-10-vw,y+18);
      y+=34;
    } else if(l.type==="quota"){
      ctx.fillStyle="#181c26";
      roundRect(ctx,pad,y,W-pad*2,44,8);
      ctx.fillStyle="#eef0f5";
      ctx.font="bold 13px Roboto, Arial, sans-serif";
      ctx.fillText(l.name,pad+12,y+18);
      ctx.fillStyle="#7a85a0";
      ctx.font="11px Roboto, Arial, sans-serif";
      ctx.fillText(l.paid+"/"+l.total+" pagaron · "+fmt(l.collected),pad+12,y+34);
      // Progress bar
      const bx=W-pad-160,bw=150,bh=6,by=y+19;
      ctx.fillStyle="#252d42";
      roundRect(ctx,bx,by,bw,bh,3);
      ctx.fillStyle=l.pct===100?"#3dd68c":"#2d5be3";
      roundRect(ctx,bx,by,Math.max(bw*(l.pct/100),l.pct>0?4:0),bh,3);
      ctx.fillStyle=l.pct===100?"#3dd68c":"#7a85a0";
      ctx.font="bold 12px Roboto, Arial, sans-serif";
      const pw=ctx.measureText(l.pct+"%").width;
      ctx.fillText(l.pct+"%",bx-pw-8,by+bh);
      y+=52;
    }
  });

  // Footer
  ctx.fillStyle="#323d57";
  ctx.font="11px Roboto, Arial, sans-serif";
  const footer="Generado por Comité 4°B · "+new Date().toLocaleString("es-CL");
  ctx.fillText(footer,pad,H-12);

  // Download or share
  canvas.toBlob(function(blob){
    const fname=(quotaId?"cuota_":"resumen_")+hoy()+".png";
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],"img.png",{type:"image/png"})]})){
      navigator.share({files:[new File([blob],fname,{type:"image/png"})],title:"Comité 4°B"});
    } else {
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=fname;a.click();
      URL.revokeObjectURL(url);
      showToast("✓ Imagen descargada");
    }
  },"image/png");
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

function showToast(msg,type="ok"){const tc=document.getElementById("toast-container");tc.innerHTML=`<div class="toast ${type}">${msg}</div>`;setTimeout(()=>{tc.innerHTML="";},2400);}
</script>
