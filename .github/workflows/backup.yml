name: Backup diario Firebase

on:
  schedule:
    - cron: '0 9 * * *'   # 6:00 AM hora Chile (UTC-3)
  workflow_dispatch:        # permite correr manualmente

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener fecha
        id: fecha
        run: echo "FECHA=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Fetch datos Firebase - 4B
        run: |
          curl -sf "https://bsg-7772d-default-rtdb.firebaseio.com/cursos/4B.json" \
            -o "backup_4B.json"
          echo "✓ 4B: $(wc -c < backup_4B.json) bytes"

      - name: Fetch datos Firebase - 3D
        run: |
          curl -sf "https://bsg-7772d-default-rtdb.firebaseio.com/cursos/3D.json" \
            -o "backup_3D.json"
          echo "✓ 3D: $(wc -c < backup_3D.json) bytes"

      - name: Clonar repo de backups
        run: |
          git clone "https://x-access-token:${{ secrets.BACKUP_TOKEN }}@github.com/fjrosselot/tesoreros-sg-backups.git" backups-repo

      - name: Copiar archivos y hacer commit
        run: |
          FECHA=${{ steps.fecha.outputs.FECHA }}
          cd backups-repo

          mkdir -p 4B 3D
          cp "../backup_4B.json" "4B/${FECHA}.json"
          cp "../backup_3D.json" "3D/${FECHA}.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "Sin cambios nuevos, nada que commitear"
          else
            git commit -m "backup ${FECHA}"
            git push
            echo "✓ Backup ${FECHA} publicado"
          fi
